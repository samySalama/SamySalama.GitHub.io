<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2330;
    --border: #30363d;
    --eco-green: #00b894;
    --eco-teal: #00cec9;
    --accent: #fdcb6e;
    --danger: #e17055;
    --warning: #f39c12;
    --safe: #00b894;
    --text: #e6edf3;
    --muted: #8b949e;
    --badge-dish: #0984e3;
    --badge-floor: #6c5ce7;
    --badge-sanitize: #00b894;
    --badge-degreaser: #e17055;
    --badge-descale: #fdcb6e;
    --badge-hand: #fd79a8;
    --badge-other: #636e72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #1a2a1a 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .logo-badge {
    background: var(--eco-green);
    color: #000;
    font-weight: 900;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 1px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .header-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* SEARCH */
  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 42px 10px 16px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--eco-green);
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  /* FILTER TABS */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 16px 4px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--eco-green);
    border-color: var(--eco-green);
    color: #000;
    font-weight: 700;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
  }

  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* CARDS */
  .cards-container {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s;
    cursor: pointer;
  }

  .card:active { transform: scale(0.99); }

  .card.expanded { border-color: var(--eco-green); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
  }

  .danger-strip {
    width: 4px;
    border-radius: 4px;
    align-self: stretch;
    flex-shrink: 0;
    min-height: 40px;
  }

  .danger-high { background: var(--danger); }
  .danger-med  { background: var(--warning); }
  .danger-low  { background: var(--safe); }

  .card-info { flex: 1; min-width: 0; }

  .card-name-en {
    font-size: 15px;
    font-weight: 700;
    color: var(--eco-teal);
    letter-spacing: 0.3px;
  }

  .card-name-ar {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text);
    margin-top: 4px;
    font-weight: 600;
  }

  .card-badges {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    color: #fff;
  }

  .badge-dish      { background: var(--badge-dish); }
  .badge-floor     { background: var(--badge-floor); }
  .badge-sanitize  { background: var(--badge-sanitize); color: #000; }
  .badge-degreaser { background: var(--badge-degreaser); }
  .badge-descale   { background: var(--badge-descale); color: #000; }
  .badge-hand      { background: var(--badge-hand); color: #000; }
  .badge-other     { background: var(--badge-other); }

  .card-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .card.expanded .card-arrow { transform: rotate(180deg); color: var(--eco-green); }

  /* EXPANDED DETAILS */
  .card-details {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px;
    background: #131920;
  }

  .card.expanded .card-details { display: block; }

  .detail-section {
    margin-bottom: 14px;
  }

  .detail-section:last-child { margin-bottom: 0; }

  .detail-label {
    font-size: 11px;
    color: var(--eco-green);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .detail-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  /* DILUTION BOX */
  .dilution-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dilution-icon { font-size: 22px; }

  .dilution-text { color: var(--text); line-height: 1.5; }
  .dilution-ratio { color: var(--accent); font-weight: 700; font-size: 15px; }

  /* PPE ICONS */
  .ppe-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ppe-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    min-width: 64px;
  }

  .ppe-icon { font-size: 24px; }

  .ppe-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    line-height: 1.3;
  }

  /* DANGER LEVEL */
  .danger-row {
    display: flex;
    gap: 6px;
  }

  .danger-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .danger-pill.high { background: #3d1a1a; color: var(--danger); border: 1px solid var(--danger); }
  .danger-pill.med  { background: #3d2d0a; color: var(--warning); border: 1px solid var(--warning); }
  .danger-pill.low  { background: #0a2d1a; color: var(--safe); border: 1px solid var(--safe); }

  /* FIRST AID */
  .aid-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .aid-item:last-child { border-bottom: none; }
  .aid-emoji { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* SECTION HEADER */
  .section-header {
    padding: 10px 16px 6px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* WARNING BANNER */
  .warning-banner {
    background: #1a1200;
    border: 1px solid #3d2d00;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--warning);
    margin: 10px 12px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>

let activeCategory = 'all';

function getDangerClass(d) {
  return d === 'high' ? 'danger-high' : d === 'med' ? 'danger-med' : 'danger-low';
}

function getDangerLabel(d) {
  return d === 'high' ? 'خطورة عالية' : d === 'med' ? 'خطورة متوسطة' : 'آمن نسبياً';
}

function getDangerPillClass(d) {
  return d === 'high' ? 'high' : d === 'med' ? 'med' : 'low';
}

function getBadgeHTML(cats) {
  const map = {
    dish: ['badge-dish', 'غسيل أطباق'],
    sanitize: ['badge-sanitize', 'تطهير'],
    floor: ['badge-floor', 'أرضيات'],
    descale: ['badge-descale', 'إزالة أملاح'],
    degreaser: ['badge-degreaser', 'مزيل شحوم'],
    hand: ['badge-hand', 'العناية باليد'],
    other: ['badge-other', 'أخرى']
  };
  return cats.map(c => `<span class="badge ${map[c][0]}">${map[c][1]}</span>`).join('');
}

function renderCards(list) {
  const container = document.getElementById('cardsContainer');
  const empty = document.getElementById('emptyState');
  const countLabel = document.getElementById('countLabel');

  if (list.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    countLabel.textContent = 'لا توجد نتائج';
    return;
  }

  empty.style.display = 'none';
  countLabel.textContent = `${list.length} ${list.length === 1 ? 'مادة' : 'مواد'}`;

  container.innerHTML = list.map(c => `
    <div class="card" id="card-${c.id}" onclick="toggleCard(${c.id})">
      <div class="card-header">
        <div class="danger-strip ${getDangerClass(c.danger)}"></div>
        <div class="card-info">
          <div class="card-name-en">${c.nameEn}</div>
          <div class="card-name-ar">${c.nameAr}</div>
          <div class="card-desc">${c.desc}</div>
          <div class="card-badges">${getBadgeHTML(c.category)}</div>
        </div>
        <div class="card-arrow">▼</div>
      </div>
      <div class="card-details">
        <div class="detail-section">
          <div class="detail-label">مستوى الخطورة</div>
          <div class="danger-row">
            <span class="danger-pill ${getDangerPillClass(c.danger)}">${getDangerLabel(c.danger)}</span>
          </div>
          ${c.hazard ? `<div class="detail-value" style="margin-top:8px;color:var(--warning)">${c.hazard}</div>` : ''}
        </div>

        <div class="detail-section">
          <div class="detail-label">نسبة التخفيف</div>
          <div class="dilution-box">
            <div class="dilution-icon">💧</div>
            <div class="dilution-text">
              <div class="dilution-ratio">${c.dilution}</div>
              <div style="color:var(--muted);font-size:12px;margin-top:2px">${c.dilutionNote}</div>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">معدات الحماية (PPE)</div>
          <div class="ppe-row">
            ${c.ppe.map(p => `<div class="ppe-item"><div class="ppe-icon">${p.icon}</div><div class="ppe-label">${p.label}</div></div>`).join('')}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">طريقة الاستخدام</div>
          <div class="detail-value">${c.usage}</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">الإسعافات الأولية</div>
          ${c.firstAid.map(a => `<div class="aid-item"><div class="aid-emoji">${a.icon}</div><div>${a.text}</div></div>`).join('')}
        </div>

        <div class="detail-section">
          <div class="detail-label">التخزين</div>
          <div class="detail-value">${c.storage}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) {
    card.classList.add('expanded');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  }
}

function getFilteredList() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  return chemicals.filter(c => {
    const matchCat = activeCategory === 'all' || c.category.includes(activeCategory);
    const matchSearch = !query ||
      c.nameEn.toLowerCase().includes(query) ||
      c.nameAr.includes(query) ||
      c.desc.includes(query);
    return matchCat && matchSearch;
  });
}

function filterCards() {
  renderCards(getFilteredList());
}

function filterCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

// Initial render
renderCards(chemicals);
